name: CI

on:
  pull_request:
  push:

jobs:
  tender-seeds:
    name: Tender seed validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Validate tender seed data
        working-directory: backend
        run: uv run python ../data/tender/tools/validate.py
