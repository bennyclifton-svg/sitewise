# Golden evaluation set manifest (PRD §14)
# Payload PDFs are gitignored per repo convention; annotations are committed.
# Flagship speed-fixture PDFs live under backend/tests/tender/fixtures/.
meta:
  version: 1
  targets: { real_documents_min: 30, synthetic_max_share_for_gates: 0.5 }
annotation_schema:
  document:
    id: str
    source: real|synthetic
    difficulty: easy|medium|hard
    doc_type: enum
    state: NSW|VIC|QLD
    build_type: enum
    anonymised: bool
  ground_truth:
    quote:
      stated_total_cents: int?
      stated_basis: inc|ex|unknown?
      expected_residual_cents: int?
    line_items:
      - description_raw: str
        page: int
        qty: num?
        unit: str?
        amount_cents: int?
        item_status: enum
        allowance_cents: int?
        role: str?
        parent: str?
        gst_basis: inc|ex|unknown?
        counted: bool?
        duplicate_of: str?
        mappings:
          - cell: code
            fraction: num
    cell_status:
      - cell: code
        status: enum
        amount_cents: int?
documents:
  - id: enmore
    source: real
    difficulty: medium
    doc_type: builder_quote
    state: NSW
    build_type: renovation
    anonymised: false
    annotation: annotations/enmore.json
    fixture_pdf: backend/tests/tender/fixtures/Enmore.pdf
  - id: kaposi
    source: real
    difficulty: medium
    doc_type: builder_quote
    state: NSW
    build_type: renovation
    anonymised: false
    annotation: annotations/kaposi.json
    fixture_pdf: backend/tests/tender/fixtures/Kaposi.pdf
  - id: nexusbuilt
    source: real
    difficulty: hard
    doc_type: builder_quote
    state: NSW
    build_type: renovation
    anonymised: false
    annotation: annotations/nexusbuilt.json
