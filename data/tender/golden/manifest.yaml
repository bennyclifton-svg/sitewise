    doc_type: builder_quote
    state: VIC
    build_type: new_build
    anonymised: false
    annotation: annotations/coastal.json
    fixture_pdf: backend/tests/tender/fixtures/Coastal-Builders.pdf
  - id: montique
    source: real
    difficulty: hard
    doc_type: builder_quote
    state: VIC
    build_type: new_build
    anonymised: false
    annotation: annotations/montique.json
