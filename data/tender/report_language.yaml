# TCM report language — BINDING (PRD Appendix C + §9.7 claim-strength rule)
meta: { version: 1 }

report:
  title: "Tender comparison report"
  draft_label: "DRAFT"
  section_titles:
    cover: "Cover & project context"
    executive_summary: "Executive summary"
    price_comparison: "Price comparison"
    comparison_matrix: "Comparison matrix"
    allowances: "Allowances under the microscope"
    risk_notes: "Risk notes"
    questions: "Questions to ask each builder"
    methodology: "Methodology & limits"
    quote_ledgers: "Quote ledgers"
  default_narratives:
    executive_summary_intro: "This draft compares the submitted tender documents on a like-for-like basis."
    risk_notes_intro: "These notes highlight document gaps and allowances to clarify before signing."
  legal:
    disclaimer: "This report is information and document analysis only. It is not financial, legal, building, valuation, builder recommendation, or ranking advice."
    not_itemised: "Not itemised does not mean excluded; it means the document does not state the item clearly enough to rely on without builder confirmation."
  labels:
    builder: "Builder"
    computed_total: "Matrix total"
    stated_total: "Stated total"
    variance: "Variance"
    matches_stated: "Matches stated total"
    total_not_stated: "Not stated in quote"
    comparable_adjustment: "Comparable adjustment"
    cost_plus_non_comparable: "Cost-plus — excludes builder's margin; not directly comparable"
    provenance: "Provenance"
    item: "Item"
    status: "Status"
    amount: "Amount"
    flag: "Flag"
    question: "Question"
    stated_native: "Stated (native)"
    counted: "Counted"
    residual: "Residual"
    page: "Page"
    role: "Role"
    description: "Description"
    native_amount: "Native"
    ex_gst: "Ex GST"
    reprint: "reprint"
    rollup: "rollup"
    ledger_status: "Status"

status_phrases:
  excluded_explicit: "Excluded (stated, p. {page})"
  silent_ambiguous: "Not explicitly itemised — confirm with builder"
  bundled: "Appears to be covered within {parent_name} — confirm"
  ps: "Covered by provisional sum of {amount} — scope not fixed"
  pc: "Allowance of {amount} for selection"
  included: "Included"
  not_required: "Not applicable to this site/project"
  mixed: "Mixed inclusion — see line items"

claim_strength_by_benchmark_confidence:
  high: "allowance is below the typical market range ({band})"
  medium: "allowance appears low — worth querying"
  low: null   # benchmark not citable in customer-facing text

flag_phrases:
  gap: "This item is not visible in the quote — confirm whether it is covered."
  low_pc_allowance: "If you select mid-range products, expect to pay the difference as a variation."
  unrealistic_ps: "The basis for this allowance is not stated; ask how it was estimated for your site."
  missing_expected: "Projects like this one typically require this item."
  scope_ambiguity: "The wording could be read more than one way — get the intended scope in writing."
  price_outlier: "This figure differs notably from the other quotes — worth querying."
  exclusion_risk: "Excluded items become your cost after signing — price them before comparing."
  statutory_missing: "This is a compliance requirement — confirm who carries it and that it is costed."
  arithmetic_inconsistency: "The stated figures do not reconcile — ask the builder to confirm the total."
  unreconciled_residual: "Not every printed figure is accounted for in the counted total — check the quote ledger residual."
  non_comparable_basis: "This quote uses a different pricing basis and is not directly comparable without adjustment."
  suspect_number_format: "A printed figure has unusual number formatting — confirm the intended amount with the builder."

question_templates:
  gap: "{builder_name}: Please confirm whether {cell_name} is included in your price, and if not, what amount should be added."
  low_pc_allowance: "{builder_name}: Your allowance for {cell_name} is {amount}; please confirm what product/range this assumes and the likely upgrade cost."
  unrealistic_ps: "{builder_name}: Your provisional sum for {cell_name} is {amount}; please provide the basis, quantities and exclusions behind that allowance."
  missing_expected: "{builder_name}: Please confirm whether {cell_name} is required for this project and where it is allowed for in your quote."
  scope_ambiguity: "{builder_name}: Please confirm the exact scope included for {cell_name}, including any exclusions or owner-supplied items."
  price_outlier: "{builder_name}: Please confirm the basis of your {cell_name} amount and whether it includes the same scope as the other quotes."
  exclusion_risk: "{builder_name}: Please price {cell_name} as an included item, or confirm the customer must carry this cost separately."
  statutory_missing: "{builder_name}: Please confirm who is responsible for {cell_name} and where the cost is included."
  arithmetic_inconsistency: "{builder_name}: Please confirm the arithmetic behind the quoted total and provide a corrected total if needed."
  unreconciled_residual: "{builder_name}: Please confirm the figures behind your stated total; the counted line items leave an unexplained residual of {amount}."
  non_comparable_basis: "{builder_name}: Please confirm whether your price is cost-plus or lump-sum and what is excluded from the stated total."
  suspect_number_format: "{builder_name}: Please confirm the intended amount for {cell_name}; the printed figure has unusual formatting."

analysis:
  notes:
    no_benchmark_available: "No benchmark available for this item."
    floor_area_required: "Floor area is required before this benchmark can be priced."
    stated_total_required: "A stated quote total is required before this percentage benchmark can be priced."
    ratio_not_priced: "Ratio benchmarks are not priced directly in the comparison ledger."
    low_confidence_unquantified: "A low-confidence benchmark exists, but it is not included in the customer-facing comparable price."
    incomplete_benchmark: "The benchmark row is missing the percentile needed for this calculation."

forbidden_terms:
  - ripoff
  - rip-off
  - hiding
  - hidden fees
  - dodgy
  - underquoting
  - lowballing
  - dishonest
  - misleading
  - scam

principles:
  - Findings describe documents, never motives.
  - '"Excluded" appears only with an explicit exclusions-list page reference.'
  - Inferred statuses always carry a confirm-with-builder action.
  - Every customer-facing number carries provenance (page ref or benchmark id).
  - Benchmark claims obey claim_strength_by_benchmark_confidence without exception.
