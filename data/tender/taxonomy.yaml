# TCM Class 1 taxonomy — v1 (model_seed 2026-06-11, QS gate pending)
# Loader contract: meta.defaults fill omitted fields; grp derives from code prefix.
# stage: prelim | base | lockup | fixing | completion | external | statutory
# bt = build_type_tags override; rt = region_tags override; bp = bundling_parents; bk = benchmark_key
meta:
  version: 1
  context_version: 1
  defaults:
    build_type_tags: [new_build, renovation, addition]
    region_tags: [NSW, VIC, QLD]
    active: true

groups:
  "01": { name: "Preliminaries & approvals" }
  "02": { name: "Demolition & site preparation" }
  "03": { name: "Site costs & groundworks" }
  "04": { name: "Substructure" }
  "05": { name: "Frame & structure" }
  "06": { name: "Roofing" }
  "07": { name: "External walls & cladding" }
  "08": { name: "Windows & external doors" }
  "09": { name: "Garage & lockup" }
  "10": { name: "Services rough-in & fit-off" }
  "11": { name: "Energy & compliance" }
  "12": { name: "Internal linings" }
  "13": { name: "Fixing & joinery" }
  "14": { name: "Kitchen" }
  "15": { name: "Bathrooms & wet areas" }
  "16": { name: "Painting" }
  "17": { name: "Floor coverings" }
  "18": { name: "Appliances & fixtures" }
  "19": { name: "External works" }
  "20": { name: "Connections & authority" }
  "21": { name: "Statutory, insurance & certification" }
  "22": { name: "Contract commercials" }
  "99": { name: "Unallocated" }

